<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Packages · Quake Code</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="description" content="Extensions, skills, themes, and prompts for Quake Code." />
  <style>
    :root {
      --bg: #0b0b0f;
      --bg-soft: #111117;
      --card: #13151b;
      --border: #2b313c;
      --text: #f4f7fb;
      --muted: #9aa4b2;
      --silver: #d8dde6;
      --silver-dim: #b8c0cc;
      --accent: #9ad08f;
      --accent-deep: #6faa68;
      --shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
      --radius: 20px;
      --max: 1120px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top center, rgba(154, 208, 143, 0.10), transparent 24%),
        linear-gradient(180deg, #09090d 0%, #0b0b0f 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    .shell { width: min(var(--max), calc(100% - 32px)); margin: 0 auto; }
    .nav { display:flex; align-items:center; justify-content:space-between; gap:20px; padding:22px 0; }
    .brand { display:flex; align-items:center; gap:12px; font-weight:800; letter-spacing:.02em; color:var(--silver); }
    .brand-mark { width:12px; height:12px; border-radius:999px; background:linear-gradient(135deg, var(--accent), var(--silver)); box-shadow:0 0 18px rgba(154,208,143,.35); }
    .nav-links { display:flex; gap:18px; color:var(--muted); font-size:14px; }
    .section { padding: 24px 0 40px; }
    h1 { margin: 0 0 10px; font-size: clamp(36px, 5vw, 56px); line-height: 1.04; letter-spacing: -0.04em; color: var(--silver); }
    .lead { margin: 0 0 22px; color: var(--muted); font-size: 18px; }
    .toolbar { display:grid; grid-template-columns: minmax(0,1fr) 220px; gap:14px; margin: 24px 0 14px; }
    .search, .select {
      width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03); color: var(--silver); font-size: 15px; outline: none;
    }
    .chips { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:18px; }
    .chip {
      border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.03); color:var(--silver-dim);
      border-radius:999px; padding:8px 12px; font-size:13px; cursor:pointer; user-select:none;
    }
    .chip.active { border-color: rgba(154,208,143,.35); color:#eaf8e6; background: rgba(154,208,143,.08); }
    .meta-row { display:flex; justify-content:space-between; align-items:center; gap:16px; color:var(--muted); font-size:13px; margin-bottom:16px; }
    .grid { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:18px; }
    .card {
      background: rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:18px; padding:18px;
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
    }
    .card:hover { transform: translateY(-2px); border-color: rgba(154,208,143,.25); background: rgba(255,255,255,.035); }
    .topline { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .title { margin:0; color:var(--silver); font-size:22px; letter-spacing:-.02em; }
    .badge { padding:6px 10px; border-radius:999px; font-size:12px; border:1px solid rgba(154,208,143,.35); color:#dff7db; background: rgba(154,208,143,.08); }
    .summary { margin:10px 0 14px; color:var(--muted); font-size:15px; min-height:48px; }
    .submeta { color:var(--muted); font-size:13px; display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
    .links { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px; color: var(--silver-dim); font-size:14px; }
    .install {
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      border:1px solid rgba(154,208,143,.18); background:#0b0f10; border-radius:14px; padding:12px 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size:14px;
      color:var(--silver);
    }
    .copy {
      border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04); color:var(--silver);
      border-radius:10px; padding:8px 12px; cursor:pointer;
    }
    .empty { padding: 26px 0; color: var(--muted); }
    .footer { padding: 20px 0 48px; color: var(--muted); font-size: 14px; }
    @media (max-width: 900px) {
      .toolbar, .grid { grid-template-columns: 1fr; }
      .nav { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="nav">
      <a class="brand" href="/">
        <span class="brand-mark"></span>
        <span>Quake Code</span>
      </a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/packages/">Packages</a>
        <a href="https://github.com/mrquakex5/quake-code" target="_blank" rel="noreferrer">GitHub</a>
        <a href="https://www.npmjs.com/package/@mrquake/quakecode-cli" target="_blank" rel="noreferrer">npm</a>
      </nav>
    </header>

    <section class="section">
      <h1>Packages</h1>
      <p class="lead">Extensions, skills, themes, and prompts for Quake Code.</p>

      <div class="toolbar">
        <input id="search" class="search" type="search" placeholder="Search packages..." />
        <select id="sort" class="select">
          <option value="featured">Featured first</option>
          <option value="name">Name</option>
          <option value="type">Type</option>
        </select>
      </div>

      <div class="chips" id="chips">
        <button class="chip active" data-type="all">all</button>
        <button class="chip" data-type="extension">extension</button>
        <button class="chip" data-type="skill">skill</button>
        <button class="chip" data-type="theme">theme</button>
        <button class="chip" data-type="prompt">prompt</button>
      </div>

      <div class="meta-row">
        <div id="count">Loading…</div>
        <div>Install with <strong>quake install</strong> or use bundled packages out of the box.</div>
      </div>

      <div class="grid" id="grid"></div>
      <div class="empty" id="empty" hidden>No packages matched your search.</div>
    </section>

    <footer class="footer">
      Quake Code packages directory · <a href="https://quakecli.pp.ua">quakecli.pp.ua</a>
    </footer>
  </div>

  <script>
    const state = { items: [], filtered: [], type: 'all', query: '', sort: 'featured' };
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const count = document.getElementById('count');
    const search = document.getElementById('search');
    const sort = document.getElementById('sort');
    const chips = [...document.querySelectorAll('.chip')];

    function bySort(a, b) {
      if (state.sort === 'name') return a.title.localeCompare(b.title);
      if (state.sort === 'type') return a.type.localeCompare(b.type) || a.title.localeCompare(b.title);
      return Number(Boolean(b.featured)) - Number(Boolean(a.featured)) || a.title.localeCompare(b.title);
    }

    function applyFilters() {
      const q = state.query.trim().toLowerCase();
      state.filtered = state.items
        .filter(item => state.type === 'all' || item.type === state.type)
        .filter(item => {
          if (!q) return true;
          return [item.name, item.title, item.summary, item.author, item.type].join(' ').toLowerCase().includes(q);
        })
        .sort(bySort);
      render();
    }

    function card(item) {
      const links = [];
      if (item.links?.npm) links.push(`<a href="${item.links.npm}" target="_blank" rel="noreferrer">npm</a>`);
      if (item.links?.repo) links.push(`<a href="${item.links.repo}" target="_blank" rel="noreferrer">repo</a>`);
      if (item.links?.readme) links.push(`<a href="${item.links.readme}" target="_blank" rel="noreferrer">readme</a>`);
      return `
        <article class="card">
          <div class="topline">
            <div>
              <h2 class="title">${item.title}</h2>
            </div>
            <span class="badge">${item.type}</span>
          </div>
          <p class="summary">${item.summary}</p>
          <div class="submeta">
            <span>${item.author}</span>
            <span>${item.updated}</span>
            <span>${item.installs}</span>
          </div>
          <div class="links">${links.join('')}</div>
          <div class="install">
            <span>${item.install}</span>
            <button class="copy" data-copy="${item.install.replace(/"/g, '&quot;')}">Copy</button>
          </div>
        </article>
      `;
    }

    function render() {
      count.textContent = `${state.filtered.length} package${state.filtered.length === 1 ? '' : 's'}`;
      if (!state.filtered.length) {
        grid.innerHTML = '';
        empty.hidden = false;
        return;
      }
      empty.hidden = true;
      grid.innerHTML = state.filtered.map(card).join('');
      grid.querySelectorAll('[data-copy]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const value = btn.getAttribute('data-copy') || '';
          try {
            await navigator.clipboard.writeText(value);
            const old = btn.textContent;
            btn.textContent = 'Copied';
            setTimeout(() => btn.textContent = old, 1200);
          } catch {
            alert(value);
          }
        });
      });
    }

    chips.forEach(chip => chip.addEventListener('click', () => {
      chips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state.type = chip.dataset.type || 'all';
      applyFilters();
    }));

    search.addEventListener('input', () => {
      state.query = search.value;
      applyFilters();
    });

    sort.addEventListener('change', () => {
      state.sort = sort.value;
      applyFilters();
    });

    fetch('/packages/data/packages.json')
      .then(r => r.json())
      .then(items => {
        state.items = items;
        applyFilters();
      })
      .catch(err => {
        count.textContent = 'Could not load packages';
        empty.hidden = false;
        empty.textContent = 'Packages data failed to load.';
        console.error(err);
      });
  </script>
</body>
</html>
